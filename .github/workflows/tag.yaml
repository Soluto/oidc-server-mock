name: Build and push new version

on:
  push:
    tags:
      - 'v*'

env:
  TILT_VERSION: '0.34.2'

jobs:
  build_push_docker:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: get_version
        name: Format docker image tag
        uses: battila7/get-version-action@169bf498b5cdd7ef6804e4411eefbdab319aa503 # v2.1.0

      - id: repository_owner
        name: Format repository owner
        uses: ASzc/change-string-case-action@d0603cd0a7dd490be678164909f65c7737470a7f # v6
        with:
          string: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build and export to Docker
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          load: true
          context: ./src
          file: ./src/Dockerfile
          tags: ghcr.io/${{ steps.repository_owner.outputs.lowercase }}/oidc-server-mock:${{ steps.get_version.outputs.version-without-v }}-test

      - name: Cache Tilt binary
        id: cache-tilt
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/tilt
          key: tilt-${{ runner.os }}-${{ env.TILT_VERSION }}  # arch assumed x86_64; update key if ARM runners added

      - name: Install Tilt
        if: steps.cache-tilt.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL "https://github.com/tilt-dev/tilt/releases/download/v${TILT_VERSION}/tilt.${TILT_VERSION}.linux.x86_64.tar.gz" \
            | tar -xz -C ~/.local/bin tilt

      - name: Add Tilt to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Run npm install
        run: pnpm install --frozen-lockfile

      - name: Install playwright dependencies
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run Tests
        run: pnpm run tilt:ci
        env:
          IMAGE_TAG: ${{ steps.get_version.outputs.version-without-v }}-test

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.repository_owner.outputs.lowercase }}/oidc-server-mock:${{ steps.get_version.outputs.version-without-v }}-test
          format: 'table'
          exit-code: '1'
          ignore-unfixed: 'true'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
          output: 'trivy-results.txt'

      - name: Upload vulnerability scan report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-vulnerability-report
          path: trivy-results.txt
          retention-days: 30

      - name: Build and push new docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          push: true
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.repository_owner.outputs.lowercase }}/oidc-server-mock:latest
            ghcr.io/${{ steps.repository_owner.outputs.lowercase }}/oidc-server-mock:${{ steps.get_version.outputs.version-without-v }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}

  build_push_nuget:
    name: Build and Push Nuget package
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    defaults:
      run:
        working-directory: src
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      dotnet-version: '8.0'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download UI
        run: ./getui.sh

      - name: Setup .NET Core SDK ${{ env.dotnet-version }}
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ env.dotnet-version }}
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

      - name: Install dependencies
        run: dotnet restore

      - id: get_version
        name: Format nuget package version
        uses: battila7/get-version-action@169bf498b5cdd7ef6804e4411eefbdab319aa503 # v2.1.0

      - name: Build Nuget package
        run: |
          dotnet pack --no-restore --configuration Release \
            /p:VersionPrefix=${{ steps.get_version.outputs.version-without-v }} \
            /p:RepositoryCommit=${{ github.sha }}

      - name: Push Nuget package
        run: dotnet nuget push bin/Release/*.nupkg -k ${{ env.NUGET_AUTH_TOKEN }}
