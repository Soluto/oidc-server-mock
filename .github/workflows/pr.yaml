name: PR

on:
  pull_request:
    paths-ignore:
      - README.md

  workflow_dispatch:

concurrency:
  group: pr-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  TILT_VERSION: '0.34.2'

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Tilt binary
        id: cache-tilt
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/tilt
          key: tilt-${{ runner.os }}-${{ env.TILT_VERSION }}  # arch assumed x86_64; update key if ARM runners added

      - name: Install Tilt
        if: steps.cache-tilt.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL "https://github.com/tilt-dev/tilt/releases/download/v${TILT_VERSION}/tilt.${TILT_VERSION}.linux.x86_64.tar.gz" \
            | tar -xz -C ~/.local/bin tilt

      - name: Add Tilt to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Run npm install
        run: pnpm install --frozen-lockfile

      - name: Install playwright dependencies
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Eslint
        run: pnpm run lint

      - name: Run Tests
        run: pnpm run tilt:ci
